services:
  localstack:
    image: localstack/localstack:3.0.2
    ports:
      - '4566:4566' # LocalStack Gateway
      - '4510-4559:4510-4559' # external services port range
    env_file:
      - 'compose/aws.env'
    environment:
      DEBUG: ${DEBUG:-1}
      LS_LOG: WARN # Localstack DEBUG Level
      SERVICES: s3,sqs,sns,firehose
      LOCALSTACK_HOST: 127.0.0.1
    volumes:
      - '${TMPDIR:-/tmp}/localstack:/var/lib/localstack'
      - ./compose/start-localstack.sh:/etc/localstack/init/ready.d/start-localstack.sh
    healthcheck:
      test: ['CMD', 'curl', 'localhost:4566']
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - cdp-tenant

  redis:
    image: redis:7.2.3-alpine3.18
    ports:
      - '6379:6379'
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 5s
      start_period: 2s
      retries: 5
    networks:
      - cdp-tenant

  mongodb:
    image: mongo:6.0.13
    networks:
      - cdp-tenant
    ports:
      - '27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 5s
      start_period: 5s
      retries: 5

    volumes:
      - mongodb-data:/data
    restart: always

  ################################################################################

  epr-register-enrol-frontend:
    build: ./
    ports:
      - '3000:3000'
    links:
      - 'localstack:localstack'
      - 'redis:redis'
    depends_on:
      localstack:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - 'compose/aws.env'
    environment:
      PORT: 3000
      NODE_ENV: development
      REDIS_HOST: redis
      LOCALSTACK_ENDPOINT: http://localstack:4566
      USE_SINGLE_INSTANCE_CACHE: true
      API_BASE_URL: http://epr-register-enrol-backend:8080
    networks:
      - cdp-tenant

  epr-register-enrol-backend:
    image: defradigital/epr-register-enrol-backend:${EPR_REGISTER_ENROL_BACKEND:-latest}
    platform: linux/amd64
    environment:
      - PORT=8080
      - LOCALSTACK_ENDPOINT='http://localstack:4566'
      - MONGO_URI='mongodb://mongodb:27017/'

    depends_on:
      redis:
        condition: service_healthy
    ports:
      - 8080:8080
    healthcheck:
      test: ['CMD', 'curl', 'http://epr-register-enrol-backend:8080/health']
      interval: 3s
      start_period: 2s
      retries: 3
    networks:
      - cdp-tenant

################################################################################
volumes:
  mongodb-data:

networks:
  cdp-tenant:
    driver: bridge
